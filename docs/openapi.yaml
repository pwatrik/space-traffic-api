openapi: 3.1.0
info:
  title: Space Traffic API
  version: "1.1"
  description: |
    Simulated solar-system shipping traffic API for data-engineering demos.

    This API is fully public and does not require authentication.
servers:
  - url: http://localhost:8000
    description: Local development server

components:
  parameters:
    Limit1000:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    Limit5000:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 1000
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    SinceId:
      name: since_id
      in: query
      schema:
        type: integer

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  /openapi.yaml:
    get:
      summary: Get this OpenAPI spec
      responses:
        "200":
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string

  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status and counts

  /stations:
    get:
      summary: List stations
      parameters:
        - name: body_type
          in: query
          schema:
            type: string
            enum: [planet, moon, asteroid]
        - $ref: "#/components/parameters/Limit5000"
        - $ref: "#/components/parameters/Offset"
        - name: order_by
          in: query
          schema:
            type: string
            enum: [id, name, body_name, body_type, parent_body]
            default: body_type
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Paginated station list

  /ships:
    get:
      summary: List ships
      parameters:
        - name: faction
          in: query
          schema:
            type: string
            enum: [merchant, government, military, bounty_hunter]
        - name: home_station_id
          in: query
          schema:
            type: string
        - name: cargo
          in: query
          schema:
            type: string
        - name: ship_type
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit5000"
        - $ref: "#/components/parameters/Offset"
        - name: order_by
          in: query
          schema:
            type: string
            enum: [id, name, faction, ship_type, cargo, home_station_id, size_class]
            default: id
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Paginated ship list

  /ships/state:
    get:
      summary: List live ship states
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, decommissioned, destroyed]
        - name: in_transit
          in: query
          schema:
            type: string
            enum: ["0", "1", "true", "false", "yes", "no", "on", "off"]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 500
      responses:
        "200":
          description: Ship state list

  /stats:
    get:
      summary: Fleet aggregate stats
      responses:
        "200":
          description: Aggregate counts and scenario/pirate metrics

  /departures:
    get:
      summary: Poll departure events
      parameters:
        - $ref: "#/components/parameters/SinceId"
        - name: since_time
          in: query
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/Limit1000"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Departure events page

  /departures/stream:
    get:
      summary: Stream departure events (SSE)
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string

  /control-events:
    get:
      summary: Poll control-plane events
      parameters:
        - $ref: "#/components/parameters/SinceId"
        - $ref: "#/components/parameters/Limit1000"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Control events page

  /control-events/stream:
    get:
      summary: Stream control-plane events (SSE)
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string

  /config:
    get:
      summary: Get runtime snapshot
      responses:
        "200":
          description: Runtime configuration and active scenario/fault state
    patch:
      summary: Patch runtime configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deterministic_mode:
                  type: boolean
                deterministic_seed:
                  type: integer
                db_max_size_mb:
                  type: integer
                  minimum: 50
      responses:
        "200":
          description: Updated runtime snapshot

  /scenarios:
    get:
      summary: List available scenarios
      responses:
        "200":
          description: Available and active scenario data

  /scenarios/activate:
    post:
      summary: Activate a scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  enum: [war, shortage, solar_flare]
                intensity:
                  type: number
                  minimum: 0
                  maximum: 5
                  default: 1.0
                duration_seconds:
                  type: integer
                  minimum: 1
                  default: 300
                scope:
                  type: object
      responses:
        "200":
          description: Active scenario set
        "400":
          description: Invalid scenario payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios/deactivate:
    post:
      summary: Deactivate current scenario
      responses:
        "200":
          description: Active scenario cleared

  /faults:
    get:
      summary: List available faults
      responses:
        "200":
          description: Available and active fault data

  /faults/activate:
    post:
      summary: Activate one or more faults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                faults:
                  type: object
      responses:
        "200":
          description: Active faults updated
        "400":
          description: Invalid fault payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faults/deactivate:
    post:
      summary: Deactivate selected (or all) faults
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                names:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Active faults updated
        "400":
          description: Invalid names payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/reset:
    post:
      summary: Reset simulation state
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                seed:
                  type: integer
      responses:
        "200":
          description: Reset complete with runtime snapshot

tags:
  - name: public
    description: Public endpoints (no authentication required)
